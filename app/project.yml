name: Crates
options:
  bundleIdPrefix: com.djmunya
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  PRODUCT_NAME: Crates
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  ENABLE_HARDENED_RUNTIME: YES
  CODE_SIGN_ENTITLEMENTS: Resources/Crates.entitlements

targets:
  Crates:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.djmunya.crates
      INFOPLIST_FILE: ""
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      INFOPLIST_KEY_CFBundleDisplayName: Crates
      INFOPLIST_KEY_CFBundleURLTypes:
        - CFBundleURLName: com.djmunya.crates
          CFBundleURLSchemes:
            - crates
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
